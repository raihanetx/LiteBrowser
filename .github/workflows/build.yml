name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd browser_app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build release APK
        run: |
          cd browser_app
          ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: browser_app/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## LiteBrowser v${{ github.ref_name }}
            
            ### Features:
            - 🍪 Professional Cookie Management
            - 🛡️ Third-party cookie blocking
            - 🚫 Block/Allow specific sites
            - 📜 Browsing History
            - 🔒 Incognito Mode
            - 🖥️ Desktop Mode
            - 🔍 Zoom (50%-150%)
            
            ### Download:
            - Debug APK: app-debug.apk
            - Release APK: app-release-unsigned.apk
          files: |
            browser_app/app/build/outputs/apk/debug/app-debug.apk
            browser_app/app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
