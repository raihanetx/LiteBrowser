name: Android Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug || gradle assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease || gradle assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4

    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: ./apk

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: app-release
        path: ./apk

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0-${{ steps.date.outputs.date }}
        name: LiteBrowser v1.0.0 - ${{ steps.date.outputs.date }}
        body: |
          ## LiteBrowser - Lightweight Android Browser

          ### Features
          - Full Tab Management (up to 10 tabs)
          - Desktop Mode Toggle
          - Zoom Controls (pinch-to-zoom + buttons)
          - Third-Party Cookie Blocking
          - Per-Site Cookie Viewer/Deleter

          ### Downloads
          - `app-debug.apk` - Debug build (signed with debug key)
          - `app-release.apk` - Release build

          ### Installation
          1. Download the APK
          2. Enable "Install from unknown sources" in your Android settings
          3. Open the APK and install
        files: ./apk/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
