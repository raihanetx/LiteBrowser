name: Android Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Build Release APK  
      run: ./gradlew assembleRelease --no-daemon

    - name: Get version info
      id: version
      run: |
        echo "version=v1.0.0-$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: LiteBrowser ${{ steps.version.outputs.version }}
        body: |
          ## LiteBrowser - Lightweight Android Browser
          Build Date: ${{ steps.version.outputs.date }}

          ### Features
          - Full Tab Management (up to 10 tabs)
          - Desktop Mode Toggle
          - Zoom Controls (pinch-to-zoom + buttons)
          - Third-Party Cookie Blocking
          - Per-Site Cookie Viewer/Deleter

          ### Installation
          1. Download the APK
          2. Enable "Install from unknown sources" in your Android settings
          3. Open the APK and install
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
